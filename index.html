<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert YouTube videos into self-contained HTML reference documents">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YouTutu">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
  <title>YouTutu</title>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">YouTutu</h1>
    <p class="app-subtitle">YouTube to reference doc</p>
  </header>

  <main>
    <!-- Input View -->
    <section id="input-view" class="view active">
      <form id="url-form" class="input-card">
        <label for="url-input" class="input-label">YouTube URL</label>
        <input
          type="text"
          id="url-input"
          class="url-input"
          placeholder="Paste a YouTube link..."
          autocomplete="off"
          inputmode="url"
          required
        >
        <button type="submit" id="generate-btn" class="btn btn-primary">
          Generate Notes
        </button>
      </form>
    </section>

    <!-- Processing View -->
    <section id="processing-view" class="view">
      <div class="processing-card">
        <h2 class="processing-title" id="video-title-preview"></h2>
        <ol class="progress-steps" id="progress-steps">
          <li class="step" data-step="metadata">
            <span class="step-icon"></span>
            <span class="step-label">Fetching video data</span>
          </li>
          <li class="step" data-step="storyboards">
            <span class="step-icon"></span>
            <span class="step-label">Loading storyboards</span>
          </li>
          <li class="step" data-step="transcript">
            <span class="step-icon"></span>
            <span class="step-label">Fetching transcript</span>
          </li>
          <li class="step" data-step="keyframes">
            <span class="step-icon"></span>
            <span class="step-label">Detecting keyframes</span>
          </li>
          <li class="step" data-step="summary">
            <span class="step-icon"></span>
            <span class="step-label">Generating summary</span>
          </li>
          <li class="step" data-step="rendering">
            <span class="step-icon"></span>
            <span class="step-label">Building document</span>
          </li>
        </ol>
        <button type="button" id="cancel-btn" class="btn btn-secondary">
          Cancel
        </button>
      </div>
    </section>

    <!-- Result View -->
    <section id="result-view" class="view">
      <div class="result-card">
        <div class="result-preview">
          <iframe id="result-iframe" sandbox="allow-same-origin" title="Document preview"></iframe>
        </div>
        <div class="result-actions">
          <button type="button" id="save-btn" class="btn btn-primary">
            Save as HTML
          </button>
          <button type="button" id="share-btn" class="btn btn-secondary">
            Share
          </button>
          <button type="button" id="open-btn" class="btn btn-secondary">
            Open in New Tab
          </button>
          <button type="button" id="another-btn" class="btn btn-ghost">
            Process Another
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
